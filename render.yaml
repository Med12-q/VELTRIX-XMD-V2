services:
  - type: web
    name: veltrix-xmd
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: OWNER_NUMBERS
        sync: false
      - key: PREFIX
        value: "."
      - key: SESSION_SECRET
        generateValue: true
